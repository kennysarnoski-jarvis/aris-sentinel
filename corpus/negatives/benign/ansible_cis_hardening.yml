---
# CIS hardening playbook. Each task cites its control so auditors can trace it.
# We disable unused services to avoid exposing attack surface, and enforce SSH key-only
# auth in order to eliminate password brute-force as a vector.
- name: Harden baseline
  hosts: all
  become: true
  tasks:
    - name: Disable root SSH login (CIS 5.2.8) to avoid direct root brute-force
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^PermitRootLogin"
        line: "PermitRootLogin no"

    - name: Enforce key-only auth (CIS 5.2.10) so that stolen passwords are useless
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^PasswordAuthentication"
        line: "PasswordAuthentication no"

    - name: Enable auditd (CIS 4.1.1) in order to record security-relevant events
      service:
        name: auditd
        state: started
        enabled: true
